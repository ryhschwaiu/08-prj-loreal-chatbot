<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Assistant</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <div class="brand-lockup">
          <img
            src="img/loreal-logo.png"
            alt="L'Oreal logo"
            class="brand-logo"
          />
          <div>
            <p class="brand-kicker">L'Oreal Paris</p>
            <h1 class="site-title">Beauty Advisor Chatbot</h1>
          </div>
        </div>
      </header>

      <!------- Chat Area ------->
      <main>
        <section class="chatbox">
          <div class="chat-window-stage">
            <div
              id="profileOverlay"
              class="profile-overlay hidden"
              aria-hidden="true"
            >
              <div
                class="profile-window"
                role="dialog"
                aria-modal="true"
                aria-labelledby="profileTitle"
              >
                <div class="profile-window__header">
                  <h2 id="profileTitle">Profile</h2>
                  <button
                    type="button"
                    id="closeProfileBtn"
                    class="icon-button icon-button--ghost"
                  >
                    <span class="material-icons" aria-hidden="true">close</span>
                    <span class="visually-hidden">Close profile</span>
                  </button>
                </div>

                <div id="profileContent" class="profile-content"></div>

                <div class="profile-window__footer">
                  <button
                    type="button"
                    id="clearProfileBtn"
                    class="clear-profile-btn"
                  >
                    <span class="material-icons" aria-hidden="true"
                      >delete</span
                    >
                    <span>Clear</span>
                  </button>
                </div>
              </div>
            </div>

            <div id="chatWindow" class="chat-window">
              <!-- messages will be appended here via JS -->
            </div>
          </div>

          <form id="chatForm" class="chat-form">
            <button
              type="button"
              id="profileBtn"
              class="profile-btn"
              aria-label="Open profile"
              aria-expanded="false"
            >
              <span class="material-icons" aria-hidden="true">person</span>
            </button>

            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask me about products or routines…"
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2025 Company Name. All rights reserved.</p>
        <nav>
          <!-- These URLs are placeholders -->
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <!-- secrets.js can be removed when using Cloudflare Workers for API requests -->
    <script src="secrets.js"></script>
    <script src="script.js"></script>
  </body>
</html>
